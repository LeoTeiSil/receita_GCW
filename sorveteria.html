<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo & Leo | Sabores</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/sabores.css">
</head>
<body>

    <header class="header">
        <nav class="navbar">
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre nós</a>
            <a href="#" class="active">Sabores</a>
        </nav>
        <svg class="scallop-svg" viewBox="0 0 1440 60" preserveAspectRatio="none">
            <path d="M0,0 H1440 V20 Q1410 60 1380 20 Q1350 60 1320 20 Q1290 60 1260 20 Q1230 60 1200 20 Q1170 60 1140 20 Q1110 60 1080 20 Q1050 60 1020 20 Q990 60 960 20 Q930 60 900 20 Q870 60 840 20 Q810 60 780 20 Q750 60 720 20 Q690 60 660 20 Q630 60 600 20 Q570 60 540 20 Q510 60 480 20 Q450 60 420 20 Q390 60 360 20 Q330 60 300 20 Q270 60 240 20 Q210 60 180 20 Q150 60 120 20 Q90 60 60 20 Q30 60 0 20 Z" fill="#FF4D4D"/>
        </svg>
    </header>

    <main class="flavors-container">
        <section class="main-card-flavors">
            <div id="grid-produtos" class="grid-layout"></div>
        </section>

    </main>

    <div id="modal-sorvete" class="modal-overlay">
        <div class="modal-content">
            <button class="close-button" id="close-modal">&times;</button>
            <div class="modal-body">
                <div class="modal-img-container">
                    <img id="modal-img" src="" alt="Sorvete">
                </div>
                <div class="modal-info">
                    <h2 id="modal-titulo">Nome</h2>
                    <p id="modal-descricao">Descrição</p>
                    <div class="modal-footer">
                        <span id="modal-preco">R$ 0,00</span>
                        <button class="btn-pedido">Pedir no WhatsApp</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

</html>
